name: Deploy to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Inject config.js from secrets
        run: |
          cat > config.js << 'SCRIPT'
          window.SMART_CLIENT_ID = '${{ secrets.SMART_CLIENT_ID }}';
          window.SMART_CLIENT_SECRET = '${{ secrets.SMART_CLIENT_SECRET }}';
          window.GEMINI_API_ENDPOINT = '${{ secrets.GEMINI_API_ENDPOINT }}';
          SCRIPT

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
