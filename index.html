<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CareDash | 慢性病照護儀表板</title>
    <!-- Google Fonts - Plus Jakarta Sans -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <header class="header">
            <div class="logo">
                <div class="logo-icon">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M22 12h-4l-3 9L9 3l-3 9H2"/>
                    </svg>
                </div>
                <span class="logo-text">CareDash</span>
            </div>

            <!-- Patient Info in Header -->
            <div class="patient-header">
                <span class="patient-name" id="patient-name">載入中...</span>
                <span class="patient-meta" id="patient-meta">--</span>
            </div>

            <div class="header-right">
                <div class="date-badge">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
                        <line x1="16" y1="2" x2="16" y2="6"/>
                        <line x1="8" y1="2" x2="8" y2="6"/>
                        <line x1="3" y1="10" x2="21" y2="10"/>
                    </svg>
                    <span id="current-date">2026年1月25日</span>
                </div>
            </div>
        </header>

        <!-- Main Content - 3 Column Layout -->
        <main class="main-content">
            <!-- Left Column - Disease Categories -->
            <aside class="left-column">
                <h2 class="column-title">慢性病管理</h2>
                <div class="disease-list" id="disease-list">
                    <!-- Diabetes -->
                    <button class="disease-card" data-disease="dm" id="disease-dm">
                        <div class="disease-icon dm">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M12 2a10 10 0 0 1 10 10c0 5.5-4.5 10-10 10S2 17.5 2 12 6.5 2 12 2"/>
                                <path d="M12 6v6l4 2"/>
                            </svg>
                        </div>
                        <div class="disease-info">
                            <span class="disease-name">糖尿病</span>
                            <span class="disease-value" id="dm-value">--</span>
                        </div>
                        <div class="disease-status" id="dm-status"></div>
                    </button>

                    <!-- Hypertension -->
                    <button class="disease-card" data-disease="htn" id="disease-htn">
                        <div class="disease-icon htn">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M22 12h-4l-3 9L9 3l-3 9H2"/>
                            </svg>
                        </div>
                        <div class="disease-info">
                            <span class="disease-name">高血壓</span>
                            <span class="disease-value" id="htn-value">--</span>
                        </div>
                        <div class="disease-status" id="htn-status"></div>
                    </button>

                    <!-- Hyperlipidemia -->
                    <button class="disease-card" data-disease="lipid" id="disease-lipid">
                        <div class="disease-icon lipid">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <circle cx="12" cy="12" r="10"/>
                                <path d="M8 12h8M12 8v8"/>
                            </svg>
                        </div>
                        <div class="disease-info">
                            <span class="disease-name">高血脂</span>
                            <span class="disease-value" id="lipid-value">--</span>
                        </div>
                        <div class="disease-status" id="lipid-status"></div>
                    </button>

                    <!-- CKD -->
                    <button class="disease-card" data-disease="ckd" id="disease-ckd">
                        <div class="disease-icon ckd">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M6 12c0-3 2-6 6-6s6 3 6 6-2 6-6 6"/>
                                <circle cx="12" cy="12" r="2"/>
                            </svg>
                        </div>
                        <div class="disease-info">
                            <span class="disease-name">慢性腎臟病</span>
                            <span class="disease-value" id="ckd-value">--</span>
                        </div>
                        <div class="disease-status" id="ckd-status"></div>
                    </button>

                    <!-- Heart Failure -->
                    <button class="disease-card" data-disease="hf" id="disease-hf">
                        <div class="disease-icon hf">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
                            </svg>
                        </div>
                        <div class="disease-info">
                            <span class="disease-name">心衰竭</span>
                            <span class="disease-value" id="hf-value">--</span>
                        </div>
                        <div class="disease-status" id="hf-status"></div>
                    </button>

                    <!-- Atrial Fibrillation -->
                    <button class="disease-card" data-disease="af" id="disease-af">
                        <div class="disease-icon af">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M3 12h4l3-9 4 18 3-9h4"/>
                            </svg>
                        </div>
                        <div class="disease-info">
                            <span class="disease-name">心房顫動</span>
                            <span class="disease-value" id="af-value">--</span>
                        </div>
                        <div class="disease-status" id="af-status"></div>
                    </button>
                </div>
            </aside>

            <!-- Center Column - Dynamic Content -->
            <section class="center-column">
                <div class="center-header">
                    <h2 class="center-title" id="center-title">目前用藥</h2>
                    <span class="center-subtitle" id="center-subtitle"></span>
                </div>

                <!-- Content Area - Initially shows medications -->
                <div class="center-content" id="center-content">
                    <!-- Medications View (default) -->
                    <div id="medications-view" class="content-view active">
                        <div class="medications-summary" id="medications-summary">
                            <span class="med-count" id="med-count">0</span>
                            <span class="med-label">項藥物</span>
                        </div>
                        <div class="medications-list" id="medications-list">
                            <div class="loading-placeholder">載入中...</div>
                        </div>
                    </div>

                    <!-- Disease Detail View (shown when disease is selected) -->
                    <div id="disease-view" class="content-view">
                        <div class="disease-detail" id="disease-detail">
                            <!-- Dynamic disease content -->
                        </div>
                    </div>
                </div>
            </section>

            <!-- Right Column - Quick Info & Labs -->
            <aside class="right-column">
                <!-- Key Metrics -->
                <div class="metrics-card">
                    <h3 class="card-title">關鍵指標</h3>
                    <div class="metrics-grid" id="metrics-grid">
                        <div class="metric-item">
                            <span class="metric-label">HbA1c</span>
                            <span class="metric-value" id="metric-hba1c">--</span>
                            <span class="metric-unit">%</span>
                        </div>
                        <div class="metric-item">
                            <span class="metric-label">血壓</span>
                            <span class="metric-value" id="metric-bp">--/--</span>
                            <span class="metric-unit">mmHg</span>
                        </div>
                        <div class="metric-item">
                            <span class="metric-label">LDL</span>
                            <span class="metric-value" id="metric-ldl">--</span>
                            <span class="metric-unit">mg/dL</span>
                        </div>
                        <div class="metric-item">
                            <span class="metric-label">eGFR</span>
                            <span class="metric-value" id="metric-egfr">--</span>
                            <span class="metric-unit">mL/min</span>
                        </div>
                    </div>
                </div>

                <!-- Additional Labs -->
                <div class="labs-card">
                    <h3 class="card-title">其他檢驗</h3>
                    <div class="labs-grid" id="labs-grid">
                        <div class="lab-item">
                            <span class="lab-label">K⁺</span>
                            <span class="lab-value" id="lab-k">--</span>
                        </div>
                        <div class="lab-item">
                            <span class="lab-label">Hb</span>
                            <span class="lab-value" id="lab-hb">--</span>
                        </div>
                        <div class="lab-item">
                            <span class="lab-label">Cr</span>
                            <span class="lab-value" id="lab-cr">--</span>
                        </div>
                        <div class="lab-item">
                            <span class="lab-label">ACR</span>
                            <span class="lab-value" id="lab-acr">--</span>
                        </div>
                        <div class="lab-item">
                            <span class="lab-label">TG</span>
                            <span class="lab-value" id="lab-tg">--</span>
                        </div>
                        <div class="lab-item">
                            <span class="lab-label">HDL</span>
                            <span class="lab-value" id="lab-hdl">--</span>
                        </div>
                    </div>
                </div>

                <!-- AI Summary Button -->
                <button class="ai-summary-btn" id="ai-summary-btn" onclick="openIntegratedCDS()">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M12 2a10 10 0 1 0 10 10H12V2z"/>
                        <path d="M12 2a10 10 0 0 1 10 10"/>
                    </svg>
                    AI 綜合建議
                </button>
            </aside>
        </main>
    </div>

    <!-- Modal for expanded views -->
    <div id="disease-modal" class="modal" style="display: none;">
        <div class="modal-backdrop" onclick="closeModal()"></div>
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modal-title">詳細資訊</h2>
                <button class="modal-close" onclick="closeModal()">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="18" y1="6" x2="6" y2="18"/>
                        <line x1="6" y1="6" x2="18" y2="18"/>
                    </svg>
                </button>
            </div>
            <div class="modal-body" id="modal-body">
                <!-- Dynamic content -->
            </div>
        </div>
    </div>

    <!-- Loading Overlay -->
    <div id="loading-overlay" class="loading-overlay">
        <div class="loading-content">
            <div class="loading-spinner"></div>
            <p class="loading-text">正在載入病患資料...</p>
        </div>
    </div>

    <!-- Error State -->
    <div id="error-overlay" class="error-overlay" style="display: none;">
        <div class="error-content">
            <div class="error-icon">⚠️</div>
            <h2>載入錯誤</h2>
            <p id="error-message">無法連接到 FHIR 伺服器</p>
            <button onclick="location.reload()" class="btn-retry">重新載入</button>
        </div>
    </div>

    <!-- Scripts (v=20260125 for cache busting) -->
    <script src="https://cdn.jsdelivr.net/npm/fhirclient/build/fhir-client.js"></script>
    <script src="config.js?v=20260125"></script>
    <script src="core/components.js?v=20260125"></script>
    <script src="core/status.js?v=20260125"></script>
    <script src="app.js?v=20260126"></script>
    <script src="modules/medication-normalizer.js?v=20260125"></script>
    <script src="modules/cds-engine.js?v=20260125"></script>
    <script src="modules/dm.js?v=20260125"></script>
    <script src="modules/htn.js?v=20260125"></script>
    <script src="modules/lipid.js?v=20260125"></script>
    <script src="modules/hf.js?v=20260125"></script>
    <script src="modules/ckd.js?v=20260125"></script>
    <script src="modules/af.js?v=20260125"></script>
    <script src="modules/integrated-cds-prompt.js?v=20260125"></script>
    <script src="modules/integrated-cds.js?v=20260125"></script>
    <script src="dashboard-charts.js?v=20260125"></script>
</body>
</html>
